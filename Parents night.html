<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Upload</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .upload-container {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .upload-container:hover {
            background-color: #f5f5f5;
        }
        #imageInput {
            display: none;
        }
        .preview {
            margin-top: 20px;
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
        }
        .upload-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .upload-btn:hover {
            background-color: #0056b3;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Upload Memories</h1>
    
    <div class="upload-container" onclick="document.getElementById('imageInput').click()">
        <p>Click to select or drag and drop images here</p>
        <input type="file" id="imageInput" accept="image/*" multiple>
    </div>
    
    <div id="previewContainer"></div>
    
    <button class="upload-btn" onclick="uploadImages()">Upload Images</button>
    <div id="status"></div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const previewContainer = document.getElementById('previewContainer');
        const statusDiv = document.getElementById('status');

        // Handle file selection
        imageInput.addEventListener('change', showPreviews);

        // Handle drag and drop
        const uploadContainer = document.querySelector('.upload-container');
        uploadContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadContainer.style.backgroundColor = '#e9ecef';
        });
        uploadContainer.addEventListener('dragleave', () => {
            uploadContainer.style.backgroundColor = 'transparent';
        });
        uploadContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadContainer.style.backgroundColor = 'transparent';
            imageInput.files = e.dataTransfer.files;
            showPreviews();
        });

        function showPreviews() {
            previewContainer.innerHTML = '';
            const files = Array.from(imageInput.files);
            
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview';
                    previewContainer.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        async function uploadImages() {
            const files = imageInput.files;
            if (files.length === 0) {
                showStatus('Please select images first', 'error');
                return;
            }

            const formData = new FormData();
            for (let file of files) {
                formData.append('images', file);
            }

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                
                if (response.ok) {
                    showStatus(`Successfully uploaded ${result.uploadedCount} image(s)`, 'success');
                    imageInput.value = '';
                    previewContainer.innerHTML = '';
                } else {
                    showStatus('Upload failed: ' + result.message, 'error');
                }
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            }
        }

        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
        }
    </script>
</body>
</html>
